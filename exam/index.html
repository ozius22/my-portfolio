<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Development Summative Exam</title>
  <link rel="stylesheet" href="style.css" />
  <script src="./script.js" defer></script>
  </head>
<body>
  <div class="container">
    <div class="hero">
      <div id="studentInfo" class="hidden" style="margin-top: 16px;">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; max-width:520px;">
          <div>
            <label style="font-weight:600; font-size:14px; display:block; margin-bottom:6px;">
              First Name <span style="color:#b91c1c;">*</span>
            </label>
            <input id="firstName" type="text" placeholder="Enter first name" />
          </div>

          <div>
            <label style="font-weight:600; font-size:14px; display:block; margin-bottom:6px;">
              Last Name <span style="color:#b91c1c;">*</span>
            </label>
            <input id="lastName" type="text" placeholder="Enter last name" />
          </div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">Progress: -</div>
      </div>

      <div class="toolbar">
        <button class="btn-secondary" id="submitBtn" type="button">Submit Exam</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="card page-shell">
      <div class="page-header" id="pageHeader" style="padding: 18px 18px 0;"></div>
      <form id="examForm" style="padding: 0 18px 18px;"></form>

      <div class="pager-bar" style="padding: 0 18px 18px;">
        <div class="pager-left">
          <button class="btn-secondary" id="prevBtn" type="button">Previous</button>
          <button class="btn-secondary" id="nextBtn" type="button">Next</button>
        </div>
        <div class="pager-right">
          <span id="pageIndicator">Page - of -</span>
        </div>
      </div>
    </div>

    <div id="results" class="card result-box hidden"></div>
  </div>
</body>
</html>
