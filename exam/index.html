<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Development Summative Exam</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: { card: '0 8px 24px rgba(0,0,0,0.08)' }
        }
      }
    }
  </script>

  <!-- Only styles Tailwind cannot express -->
  <style>
    /* connecting line between sidebar steps */
    #sideSteps::before {
      content: '';
      position: absolute;
      left: 13px; top: 16px; bottom: 16px;
      width: 2px;
      background: #d1d5db;
      border-radius: 2px;
      z-index: 0;
    }

    /* smooth progress bar fill */
    #progressFill { transition: width 0.3s ease; }

    /* hide/show checkmark vs number inside step dot */
    .side-step .dot-check { display: none; }
    .side-step.answered .dot-num   { display: none; }
    .side-step.answered .dot-check { display: block; }

    /* step dot states */
    .side-step.current  .side-step-dot { border-color: #2563eb; background: #2563eb; color: #fff; }
    .side-step.answered .side-step-dot { border-color: #22c55e; background: #22c55e; color: #fff; }
    .side-step.current.answered .side-step-dot { border-color: #2563eb; background: #2563eb; }
    .side-step.current .side-step-title { color: #2563eb; }

    /* status colour helpers used by JS className */
    #status.good  { color: #15803d; }
    #status.bad   { color: #b91c1c; }
    #status.warn  { color: #b45309; }

    /* feedback injected by JS */
    .feedback.correct   { background: #ecfdf5; border: 1px solid #86efac; color: #166534; }
    .feedback.incorrect { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }

    /* navigator states injected by JS */
    .nav-item.current         { border-color: #2563eb; background: #dbeafe; color: #1d4ed8; }
    .nav-item.answered        { border-color: #86efac; background: #f0fdf4; color: #166534; }
    .nav-item.current.answered{ border-color: #2563eb; background: #dbeafe; color: #1d4ed8; }

    /* mobile: flip sidebar to horizontal scrollable strip */
    @media (max-width: 720px) {
      .main-layout { grid-template-columns: 1fr !important; }
      #sideProgress { position: static; max-height: none; overflow-x: auto; overflow-y: visible; }
      #sideSteps { flex-direction: row; overflow-x: auto; }
      #sideSteps::before { left: 14px; right: 14px; top: 13px; bottom: auto; width: auto; height: 2px; }
      .side-step { flex-direction: column; align-items: center; min-width: 64px; }
      .side-step-title { font-size: 10px !important; max-width: 60px; text-align: center; }
      .side-step-meta  { display: none !important; }
    }
  </style>

  <script src="./script.js" defer></script>
</head>
<body class="m-0 bg-gray-100 text-gray-800 font-sans leading-relaxed">

  <div class="max-w-5xl mx-auto mt-8 px-4 pb-10">

    <!-- ── MAIN LAYOUT ──────────────────────────────────── -->
    <div class="main-layout grid gap-5 items-start" style="grid-template-columns: 200px 1fr">

      <!-- SIDE PROGRESS BAR -->
      <aside id="sideProgress"
        class="bg-white border border-gray-300 rounded-[14px] shadow-card px-3.5 pt-4 pb-5 sticky top-6 max-h-[calc(100vh-48px)] overflow-y-auto">

        <div class="flex justify-between items-baseline mb-2.5">
          <span class="text-[11px] font-bold uppercase tracking-wider text-gray-500">Progress</span>
          <span id="progressFraction" class="text-xs font-semibold text-blue-600">0 / 0</span>
        </div>

        <!-- Fill bar -->
        <div class="w-full h-[5px] bg-gray-200 rounded-full overflow-hidden mb-4">
          <div id="progressFill" class="h-full w-0 bg-blue-600 rounded-full"></div>
        </div>

        <!-- Step list – populated by JS renderSideSteps() -->
        <ol id="sideSteps" class="list-none m-0 p-0 flex flex-col relative"></ol>

        <div id="progressText"
          class="mt-3.5 pt-2.5 border-t border-gray-200 text-xs font-semibold text-gray-500 text-center">
          0% complete
        </div>
      </aside>

      <!-- EXAM CONTENT -->
      <div class="min-w-0">

        <div id="pageShell" class="bg-white border border-gray-300 rounded-[14px] shadow-card mb-6">
          <div id="pageHeader" class="px-[18px] pt-[18px]"></div>
          <form id="examForm" class="px-[18px] pb-[18px]"></form>

          <!-- Pager -->
          <div class="flex flex-wrap justify-between items-center gap-3.5 px-[18px] pb-[18px]">
            <div class="flex flex-wrap gap-2.5 items-center">
              <button id="prevBtn" type="button"
                class="bg-gray-200 text-gray-900 font-semibold text-[15px] px-4 py-3 rounded-[10px] hover:bg-gray-300 disabled:opacity-55 disabled:cursor-not-allowed">
                Previous
              </button>
              <button id="nextBtn" type="button"
                class="bg-gray-200 text-gray-900 font-semibold text-[15px] px-4 py-3 rounded-[10px] hover:bg-gray-300 disabled:opacity-55 disabled:cursor-not-allowed">
                Next
              </button>
            </div>
            <div>
              <span id="pageIndicator" class="text-sm text-gray-500">Page - of -</span>
            </div>
          </div>
        </div>

        <!-- Submission view — shown after clicking Finish -->
        <div id="submitView" class="hidden bg-white border border-gray-300 rounded-[14px] shadow-card p-8 mb-6">
          <h2 class="text-xl font-bold mt-0 mb-1">Almost done!</h2>
          <p class="text-gray-500 text-sm mt-0 mb-6">Enter your name to submit your exam.</p>

          <div class="grid gap-4 max-w-sm mb-6" style="grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))">
            <div>
              <label class="block text-sm font-semibold mb-1">
                First Name <span class="text-red-700">*</span>
              </label>
              <input id="firstName" type="text" placeholder="Enter first name"
                class="w-full px-3 py-[11px] border border-gray-300 rounded-[10px] text-[15px] bg-white" />
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">
                Last Name <span class="text-red-700">*</span>
              </label>
              <input id="lastName" type="text" placeholder="Enter last name"
                class="w-full px-3 py-[11px] border border-gray-300 rounded-[10px] text-[15px] bg-white" />
            </div>
          </div>

          <div class="flex flex-wrap items-center gap-3">
            <button id="submitBtn" type="button"
              class="bg-blue-600 text-white font-semibold text-[15px] px-5 py-3 rounded-[10px] hover:bg-blue-700 disabled:opacity-55 disabled:cursor-not-allowed">
              Submit Exam
            </button>
            <button id="backToExamBtn" type="button"
              class="bg-gray-200 text-gray-700 font-semibold text-[15px] px-4 py-3 rounded-[10px] hover:bg-gray-300">
              ← Back to review
            </button>
          </div>

          <div id="status" class="status mt-4 font-semibold text-sm min-h-[20px]"></div>
        </div>

        <div id="results" class="hidden bg-white border border-gray-300 rounded-[14px] shadow-card p-[18px] mt-6"></div>
      </div>

    </div>
  </div>

</body>
</html>
